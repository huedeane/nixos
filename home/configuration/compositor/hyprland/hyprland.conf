#################
### Variables ###
#################

# https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = yazi
$rofi_drun = rofi -show drun
$rofi_window = rofi -show window

$rosewater = 0xfff2d5cf
$flamingo = 0xffeebebe
$pink = 0xfff4b8e4
$mauvea = 0xffca9ee6
$red = 0xffe78284
$maroon = 0xffea999c
$peach = 0xffef9f76
$yellow = 0xffe5c890
$green = 0xffa6d189
$teal = 0xff81c8be
$sky = 0xff99d1db
$sapphire = 0xff85c1dc
$blue = 0xff8caaee
$lavender = 0xffbabbf1
$text = 0xffc6d0f5
$subtext1 = 0xffb5bfe2
$subtext0 = 0xffa5adce
$overlay2 = 0xff949cbb
$overlay1 = 0xff838ba7
$overlay0 = 0xff737994
$surface2 = 0xff626880
$surface1 = 0xff51576d
$surface0 = 0xff414559
$base = 0xff303446
$mantle = 0xff292c3c
$crust = 0xff232634

################
### MONITORS ###
################

# https://wiki.hyprland.org/Configuring/Monitors/
# monitor=,preferred,auto,auto

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = hyprpaper & waybar & dunst & rofi-polkit-agent

#################
###  Plugin   ###
#################

plugin {
  split-monitor-workspaces {
    count = 5
    enable_notifications = 0
    enable_persistent_workspaces = 1
    link_monitors = 0
  }
}

#####################
### LOOK AND FEEL ###
#####################

# --- https://wiki.hyprland.org/Configuring/Variables/ ---

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
  border_size = 2
  gaps_in = 10
  gaps_out = 20
  float_gaps = 0
  gaps_workspaces = 0 
  col.inactive_border = $overlay0
  col.active_border = $lavender $lavender 45deg
  col.nogroup_border = $red
  col.nogroup_border_active = $red
  layout = scrolling
  no_focus_fallback = false
  resize_on_border = true
  extend_border_grab_area = 15
  hover_icon_on_border = true
  allow_tearing = false
  resize_corner = 2
  modal_parent_blocking = true

  # https://wiki.hyprland.org/Configuring/Variables/#snap
  snap {
    enabled = true
    window_gap = 10
    monitor_gap = 10
    border_overlap = false
    respect_gaps = false
  }
}


# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
  rounding = 0
  rounding_power = 2.0
  active_opacity = 1.0
  inactive_opacity = .98
  fullscreen_opacity = 1.0
  dim_modal = true
  dim_inactive = true
  dim_strength = 0.05
  dim_special = 0.2
  dim_around = 0.4
  #screen_shader =
  border_part_of_window = true

  # https://wiki.hyprland.org/Configuring/Variables/#blur
  blur {
    enabled = true
    size = 0
    passes = 1
    ignore_opacity = true
    new_optimizations = true
    xray = false
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
    special = false
    popups = false
    popups_ignorealpha = 0.2
    input_methods = false
    input_methods_ignorealpha = 0.2
  }

  # https://wiki.hyprland.org/Configuring/Variables/#shadow
  shadow {
      enabled = true
      range = 5
      render_power = 1
      sharp = false
      color = $lavender
      color_inactive = $overlay0
      offset = 0 0 
      scale = 1
  }

  # https://wiki.hyprland.org/Configuring/Variables/#glow
  #glow {
  #  enabled = false
  #  range = 10
  #  render_power = 3
  #  color = 
  #  color_inactive = 
  #}
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
  enabled = true
  workspace_wraparound = true

  # Bezier curves
  bezier = smoothOut, 0.36, 0, 0.66, -0.56
  bezier = smoothIn, 0.25, 1, 0.5, 1
  bezier = overshot, 0.05, 0.9, 0.1, 1.05
  bezier = softSnap, 0.34, 0, 0.2, 1
  bezier = fluent, 0.0, 0.0, 0.2, 1.0
  bezier = easeInOutExpo, 0.87, 0, 0.13, 1

  # Windows
  animation = windows, 1, 5, overshot, popin 80%
  animation = windowsIn, 1, 5, overshot, popin 50%
  animation = windowsOut, 1, 4, smoothOut, popin 50%
  animation = windowsMove, 1, 6, softSnap

  # Layers
  animation = layersIn, 1, 5, overshot, slidevert
  animation = layersOut, 1, 8, softSnap, slidevert

  # Fade
  animation = fade, 1, 4, smoothIn
  animation = fadeIn, 1, 4, smoothIn
  animation = fadeOut, 1, 4, smoothOut
  animation = fadeSwitch, 1, 4, smoothIn
  animation = fadeShadow, 1, 4, smoothIn
  animation = fadeDim, 1, 4, smoothIn
  animation = fadeDpms, 1, 4, smoothIn
  animation = fadeLayers, 1, 3, softSnap

  # Workspaces
  animation = workspaces, 1, 6, softSnap, slidevert 100%
  animation = specialWorkspace, 1, 5, overshot, slidefadevert 30%
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
  pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
  preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
  new_status = master
}

scrolling {
  fullscreen_on_one_column = true
  column_width = 1
  focus_fit_method = 1
  follow_focus = false
  follow_min_visible = 0.5
  direction = right
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
  force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
  disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
  kb_layout = us
  kb_variant =
  kb_model =
  kb_options =
  kb_rules =

  follow_mouse = 1

  sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

  touchpad {
      natural_scroll = false
  }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
#gestures {
#  workspace_swipe = false
#}

###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = ALT

#https://wiki.hyprland.org/Configuring/Binds/ for more

# General
bind = $mainMod       , T,           exec,                         $terminal
bind = $mainMod       , Return,      exec,                         $rofi_drun
bind = $mainMod       , W,           exec,                         $rofi_window
bind = $mainMod       , Escape,      exit,
bind = $mainMod       , 0,           exec,                         pkill waybar && waybar &
bind = $mainMod       , R,           exec,                         nix-rebuild.sh
bind = $mainMod  SHIFT, R,           exec,                         nix-log.sh
bind = $mainMod       , Q,           killactive,
bind = $mainMod  SHIFT, Q,           forcekillactive,
bind = $mainMod       , F,           togglefloating,
bind = $mainMod       , P,           exec,                          grimblast --freeze save area - | satty -f -

# Switch active window 
bind = $mainMod       , H,           layoutmsg,                    move -col
bind = $mainMod       , L,           layoutmsg,                    move +col
bind = $mainMod       , LEFT,        layoutmsg,                    move -col
bind = $mainMod       , RIGHT,       layoutmsg,                    move +col

bind = $mainMod       , mouse_up,    layoutmsg,                    move -col
bind = $mainMod       , mouse_down,  layoutmsg,                    move +col

bind = $mainMod       , Tab,         cyclenext

# Adjust active window width
bind = $mainMod       , J,           layoutmsg,                    colresize -conf
bind = $mainMod       , K,           layoutmsg,                    colresize +conf
bind = $mainMod       , UP,          layoutmsg,                    colresize +conf
bind = $mainMod       , DOWN,        layoutmsg,                    colresize -conf
bind = $mainMod       , F,           layoutmsg,                    fit active
bind = $mainMod       , B,           layoutmsg,                    promote

# Move active window within workspace
bind = $mainMod  SHIFT, H,           layoutmsg,                    swapcol l
bind = $mainMod  SHIFT, L,           layoutmsg,                    swapcol r
bind = $mainMod  SHIFT, LEFT,        layoutmsg,                    swapcol l
bind = $mainMod  SHIFT, RIGHT,       layoutmsg,                    swapcol r

# Switch active monitor
bind = $mainMod       , period,      focusmonitor,                 +1
bind = $mainMod       , comma,       focusmonitor,                 -1

# Move active window to another monitor
bind = $mainMod  SHIFT, period,      movewindow,                   mon:+1
bind = $mainMod  SHIFT, comma ,      movewindow,                   mon:-1

# Switch workspaces on active monitor
bind = $mainMod       , 1,           split-workspace,              1
bind = $mainMod       , 2,           split-workspace,              2
bind = $mainMod       , 3,           split-workspace,              3
bind = $mainMod       , 4,           split-workspace,              4
bind = $mainMod       , 5,           split-workspace,              5

# Move active window to a workspace on active monitor and focus
bind = $mainMod  SHIFT, 1,           split-movetoworkspace,        1
bind = $mainMod  SHIFT, 2,           split-movetoworkspace,        2
bind = $mainMod  SHIFT, 3,           split-movetoworkspace,        3
bind = $mainMod  SHIFT, 4,           split-movetoworkspace,        4
bind = $mainMod  SHIFT, 5,           split-movetoworkspace,        5

# Move active window to a workspace on active monitor silently
bind = $mainMod  CTRL , 1,           split-movetoworkspacesilent,  1
bind = $mainMod  CTRL , 2,           split-movetoworkspacesilent,  2
bind = $mainMod  CTRL , 3,           split-movetoworkspacesilent,  3
bind = $mainMod  CTRL , 4,           split-movetoworkspacesilent,  4
bind = $mainMod  CTRL , 5,           split-movetoworkspacesilent,  5

# Example special workspace (scratchpad)
bind = $mainMod,        S,           togglespecialworkspace,       magic
bind = $mainMod  SHIFT, S,           movetoworkspace,              special:magic

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod,       mouse:272,   movewindow
bindm = $mainMod,       mouse:273,   resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Laptop lock
bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-2, disable"
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-2, preferred, 0x0, 1"

##############################
### WINDOWS AND WORKSPACES ###
##############################
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Ignore maximize requests from apps. You'll probably like this.
windowrule {
  name = windowrule-1
  suppress_event = maximize
  match:class = .*
}

# Fix some dragging issues with XWayland
windowrule {
  name = windowrule-2
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}

layerrule {
  name = layerrule-1
  order = 2
  dim_around = on
  blur = on
  blur_popups = on
  match:namespace = ^(rofi)$
}

windowrule {
  name = windowrule-3
  float = on
  no_anim = on
  match:class = com.gabm.satty
}

windowrule {
  name = windowrule-4
  opacity = .95
  match:class = kitty
}

windowrule {
  name = windowrule-5
  float = on
  size = 1700 1000
  match:class = ^(tui-.*)$
}


# Monitor Auto Generate Rule
source = ~/.config/hypr/monitors.conf
