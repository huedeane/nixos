# ~/.config/tmux/tmux.conf

# --- Prefix: C-a ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Indexing ---
set -g base-index 0
setw -g pane-base-index 0
set -g renumber-windows on

# --- vi keys + pane nav/resize ---
set -g status-keys vi
set -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Reversed split bindings ---
bind v split-window -h
bind s split-window -v

# --- Kill without confirmation ---
bind & kill-window
bind x kill-pane

# --- Responsiveness / display ---
set -sg escape-time 0
set -g focus-events on
set -g default-terminal "tmux-256color"
set -g mouse on
setw -g clock-mode-style 12
set -g history-limit 10000
setw -g aggressive-resize on

# --- Auto-create/attach session "0" ---
new-session -A -s 0

# --- Plugin options that are read lazily (fine to set after load) ---
set -g @resurrect-strategy-nvim 'session'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_show_sync_mode 'on'
set -g @catppuccin_date_time_text '%H:%M'

# --- Status line (catppuccin modules + prefix indicator) ---
set -g status-position top
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{prefix_highlight}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
