# ~/.config/tmux/tmux.conf


# --- Unbind ---
unbind C-b        # default prefix (leader) key
unbind c          # default new-window
unbind &          # default kill-window
unbind p          # default previous-window
unbind n          # default next-window
unbind %          # default split-window -h
unbind '"'        # default split-window -v
unbind f          # default find-window
unbind x          # default kill-pane
unbind o          # default cycle-pane
unbind ';'        # default last-pane
unbind Up         # default select-pane -U
unbind Down       # default select-pane -D
unbind Left       # default select-pane -L
unbind Right      # default select-pane -R
unbind d          # default detach-client
unbind $          # default rename-session
unbind s          # default choose-tree (sessions)
unbind w          # default choose-tree -Zw (windows)
unbind t          # default clock-mode
unbind C-Up       # default resize-pane -U (1 cell)
unbind C-Down     # default resize-pane -D (1 cell)
unbind C-Left     # default resize-pane -L (1 cell)
unbind C-Right    # default resize-pane -R (1 cell)
unbind M-Up       # default resize-pane -U 5
unbind M-Down     # default resize-pane -D 5
unbind M-Left     # default resize-pane -L 5
unbind M-Right    # default resize-pane -R 5

# --- Leader Key ---
set -g prefix C-space
bind C-space send-prefix

# --- Keybind ---
bind -r C-q kill-window
bind -r C-t new-window
bind -r C-h previous-window
bind -r C-j swap-window -t -1 \; select-window -t -1
bind -r C-k swap-window -t +1 \; select-window -t +1
bind -r C-l next-window
bind C-v split-window -h

bind -r q kill-pane
bind -r h select-pane -t :.-
bind -r j resize-pane -L 5
bind -r k resize-pane -R 5
bind -r l select-pane -t :.+
bind    p command-prompt -p "move pane to window:" "join-pane -h -t '%%'"
bind  C-p break-pane 

bind C-escape kill-server
bind C-w choose-tree -Zs
bind escape detach-client
bind r command-prompt -I "#S" "rename-session -- '%%'"

# --- Indexing ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- vi keys ---
set -g status-keys vi
set -g mode-keys vi



set -s extended-keys always
set -as terminal-features '*:extkeys'
set -g extended-keys-format csi-u
# --- Responsiveness / display ---
set -sg escape-time 0
set -g focus-events on
set -g default-terminal "tmux-256color"
set -g mouse on
setw -g clock-mode-style 12
set -g history-limit 10000
setw -g aggressive-resize on
set -g repeat-time 1000

# --- Auto-create/attach session "0" ---
new-session -A -s Temp

# --- Plugin options that are read lazily (fine to set after load) ---
set -g @resurrect-strategy-nvim 'session'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_show_sync_mode 'on'

# --- UI Style ---
set -g status on
set -g status-position top
set -g status-left-length 100
set -g status-right-length 100
set -g status-style "bg=#{@thm_mantle},fg=#{@thm_fg}"

# Status Bar Component
set -g @custom_left_0_text " #S " 
set -g @custom_left_0_panel "#[bg=#{@thm_yellow},fg=#{@thm_crust},bold]#{E:@custom_left_0_text}#[bg=#{@thm_mantle},fg=#{@thm_yellow}]"

set -g @custom_right_0_text " #H@#(whoami) "
set -g @custom_right_0_panel "#[bg=#{@thm_surface_0},fg=#{@thm_lavender},bold]#[bg=#{@thm_lavender},fg=#{@thm_crust},bold]#{E:@custom_right_0_text}"
set -g @custom_right_1_text " %I:%M %p "
set -g @custom_right_1_panel "#[bg=#{@thm_surface_0},fg=#{@thm_lavender}]#[bg=#{@thm_surface_0},fg=#{@thm_lavender}]#{E:@custom_right_1_text}"
set -g @custom_right_2_text " %Y-%m-%d "
set -g @custom_right_2_panel "#[bg=#{@thm_mantle},fg=#{@thm_surface_0}]#[bg=#{@thm_surface_0},fg=#{@thm_lavender}]#{E:@custom_right_2_text}"

set -g @custom_window_text "#I  #W "
set -g @custom_window_panel "#[bg=#{@thm_surface_0},fg=#{@thm_mantle}] #[bg=#{@thm_surface_0},fg=#{@thm_lavender}]#{E:@custom_window_text}#[bg=#{@thm_mantle}, fg=#{@thm_surface_0}]"
set -g @custom_window_active_text "#I  #W "
set -g @custom_window_active_panel "#[bg=#{@thm_lavender},fg=#{@thm_mantle}] #[bg=#{@thm_lavender},fg=#{@thm_mantle}]#{E:@custom_window_active_text}#[bg=#{@thm_mantle}, fg=#{@thm_lavender}]"

# Status Bar Left
set -g status-left "#{E:@custom_left_0_panel}"
set -g @prefix_highlight_fg "#{@thm_crust}"
set -g @prefix_highlight_bg "#{@thm_yellow}"
set -g @prefix_highlight_prefix_prompt "WAIT"
set -g @custom_prefix "#{?client_prefix,#[fg=#{@thm_crust}#,bg=#{@thm_yellow}] PREFIX ,}"
set -ag status-right "#{E:@custom_prefix}"

# Status Bar Right
set -g status-right "#{E:@custom_right_2_panel}"
set -ag status-right "#{E:@custom_right_1_panel}"
set -ag status-right "#{E:@custom_right_0_panel}"

# Status Bar Window
set -g window-status-format "#{E:@custom_window_panel}"
set -g window-status-current-format "#{E:@custom_window_active_panel}" 
set -g window-status-separator ""

# Blank Status Bar ---
set -g status 2
set -g status-format[1] "#[fill=#{@thm_bg}]"

# Pane
set -g pane-border-lines single
set -g pane-border-status top
set -g pane-border-indicators off
set -g pane-border-format " #P: #{pane_current_command} "
set -g pane-border-style "fg=#{@thm_lavender}"
set -g pane-active-border-style "fg=#{@thm_yellow}"

# Pane Window
set -g window-style ""
set -g window-active-style ""

# Other
set -g mode-style "fg=#{@thm_crust},bg=#{@thm_lavender}"
set -g message-style "fg=#{@thm_green},bg=#{@thm_mantle}"
set -g message-command-style "fg=#{@thm_bg},bg=#{@thm_blue}"

# set -g display-panes-active-colour "bg=#{@thm_red}"
# set -g display-panes-colour "bg=#{@thm_red}"
