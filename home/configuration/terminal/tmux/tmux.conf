# --- Unbind ---
unbind C-b        # default prefix (leader) key
unbind c          # default new-window
unbind &          # default kill-window
unbind n          # default next-window
unbind p          # default previous-window
unbind ,          # default rename-window
unbind .          # default move-window (prompt for new index)
unbind f          # default find-window
unbind w          # default choose-tree -Zw (windows)
unbind M-n        # default next window with activity/alert
unbind M-p        # default previous window with activity/alert
unbind %          # default split-window -h
unbind '"'        # default split-window -v
unbind x          # default kill-pane
unbind !          # default break-pane (pane -> its own window)
unbind o          # default select-pane -t :.+
unbind ';'        # default last-pane (toggle to previous pane)
unbind Up         # default select-pane -U
unbind Down       # default select-pane -D
unbind Left       # default select-pane -L
unbind Right      # default select-pane -R
unbind M          # default clear the marked pane
unbind M-o        # default rotate-window -D (rotate panes backward)
unbind C-o        # default rotate-window
unbind C-Up       # default resize-pane -U (1 cell)
unbind C-Down     # default resize-pane -D (1 cell)
unbind C-Left     # default resize-pane -L (1 cell)
unbind C-Right    # default resize-pane -R (1 cell)
unbind M-Up       # default resize-pane -U 5
unbind M-Down     # default resize-pane -D 5
unbind M-Left     # default resize-pane -L 5
unbind M-Right    # default resize-pane -R 5
unbind Space      # default next-layout (cycle preset layouts)
unbind E          # default select-layout -E 
unbind M-1        # default select-layout even-horizontal
unbind M-2        # default select-layout even-vertical
unbind M-3        # default select-layout main-horizontal
unbind M-4        # default select-layout main-vertical
unbind M-5        # default select-layout tiled
unbind M-6        # default select-layout main-horizontal-mirrored
unbind M-7        # default select-layout main-vertical-mirrored
unbind d          # default detach-client
unbind D          # default choose-client (pick a client to detach)
unbind $          # default rename-session
unbind s          # default choose-tree (sessions)
unbind (          # default switch-client -p (previous session)
unbind )          # default switch-client -n (next session)
unbind L          # default switch-client -l (last session)
unbind C-z        # default suspend-client
unbind [          # default copy-mode (enter copy/scrollback mode)
unbind ]          # default paste-buffer (paste most recent buffer)
unbind PPage      # default copy-mode and scroll up one page (PageUp)
unbind "#"        # default list-buffers (paste buffers)
unbind -          # default delete-buffer (most recent paste buffer)
unbind =          # default choose-buffer (pick a paste buffer)
unbind S-Up       # default scroll viewport up
unbind S-Down     # default scroll viewport down
unbind S-Left     # default scroll viewport left
unbind S-Right    # default scroll viewport right
unbind t          # default clock-mode
unbind '~'        # default show-messages (message log)
unbind i          # default display-message (show window info)
unbind /          # default describe-key (show what a key does)
unbind C          # default customize-mode (interactive options/keys editor)
unbind "'"        # default select-window by index (prompt)
unbind DC         # default (Delete key) - no standard prefix action

# --- Leader Key ---
set -g prefix C-space
bind C-space send-prefix

# --- Keybind ---
bind -r C-t   new-window
bind -r C-q   kill-window
bind -r C-h   previous-window
bind -r C-l   next-window
bind -r C-j   swap-window -t -1 \; select-window -t -1
bind -r C-k   swap-window -t +1 \; select-window -t +1
bind    r     command-prompt -I "#W" "rename-window -- '%%'"

bind    t     split-window -h
bind    v     split-window -v
bind    C-p   break-pane
bind    p     command-prompt -p "move pane to window:" "join-pane -h -t '%%'"
bind -r q     kill-pane
bind    h     select-pane -t :.-
bind    l     select-pane -t :.+
bind -r space select-pane -t :.+

bind -r j     resize-pane -L 5
bind -r k     resize-pane -R 5

bind    Q     confirm-before -p "Detach client? (y/n)" detach-client
bind    C-w   choose-tree -Zs
bind    R     command-prompt -I "#S" "rename-session -- '%%'"
bind    n     new-session

# --- Popup ---
bind ? display-popup \
  -w 90% \
  -h 80% \
  -E "fzf-cheatsheet.sh tmux"

bind g display-popup \
  -d "#{pane_current_path}" \
  -w 90% \
  -h 80% \
  -E 'tmux new-session -A -s Popup gitui'

bind m display-popup \
  -w 90% \
  -h 80% \
  -E "tmux new-session -A -s MusicQueue 'rmpc'"

bind '~' run-shell \
'tmux display-popup \
  -w 90% \
  -h 80% \
  -E "fzf-cheatsheet.sh  #{pane_tty}"
'

# --- Hook ---
set-hook -g after-split-window  refresh-client
set-hook -g after-kill-pane     refresh-client
set-hook -g pane-exited         refresh-client
set-hook -g after-resize-pane   refresh-client

# --- Index ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- vi keys ---
set -g status-keys vi
set -g mode-keys vi

# --- extended keys ---
set -s extended-keys always
set -as terminal-features '*:extkeys'
set -g extended-keys-format csi-u

# --- Responsiveness / display ---
set -sg escape-time 0
set -g focus-events on
set -g default-terminal "tmux-256color"
set -g mouse on
setw -g clock-mode-style 12
set -g history-limit 10000
setw -g aggressive-resize on
set -g repeat-time 1000

# --- Auto-create/attach session "0" ---
new-session -A -s Temp

# --- Plugin options that are read lazily (fine to set after load) ---
set -g @resurrect-strategy-nvim 'session'
set -g @pane_foreground_command "#($HOME/.config/nixos/home/configuration/terminal/tmux/scripts/detect-foreground.sh #{pane_tty})"
set -g @pane_fg "#{?#{==:#{E:@pane_foreground_command},#{pane_current_command}},, -> #{E:@pane_foreground_command}}"

# --- Image Option ---
set -g allow-passthrough on
set -g visual-activity off

# --- UI Style ---
set -g status on
set -g status-position top
set -g status-left-length 100
set -g status-right-length 100
set -g status-style "bg=#{@thm_mantle},fg=#{@thm_fg}"

# Status Bar Component
set -g @custom_left_0_text " #S " 
set -g @custom_left_0_panel "#[bg=#{@thm_yellow},fg=#{@thm_crust},bold]#{E:@custom_left_0_text}#[bg=#{@thm_mantle},fg=#{@thm_yellow}]"
set -g @custom_left_0_panel_prefix "#[bg=#{@thm_peach},fg=#{@thm_crust},bold]#{E:@custom_left_0_text}#[bg=#{@thm_mantle},fg=#{@thm_peach}]"

set -g @custom_right_0_text " #H@#(whoami) "
set -g @custom_right_0_panel "#[bg=#{@thm_surface_0},fg=#{@thm_lavender},bold]#[bg=#{@thm_lavender},fg=#{@thm_crust},bold]#{E:@custom_right_0_text}"
set -g @custom_right_1_text " %I:%M %p "
set -g @custom_right_1_panel "#[bg=#{@thm_surface_0},fg=#{@thm_lavender}]#[bg=#{@thm_surface_0},fg=#{@thm_lavender}]#{E:@custom_right_1_text}"
set -g @custom_right_2_text " %Y-%m-%d "
set -g @custom_right_2_panel "#[bg=#{@thm_mantle},fg=#{@thm_surface_0}]#[bg=#{@thm_surface_0},fg=#{@thm_lavender}]#{E:@custom_right_2_text}"

set -g @custom_window_text "#I  #W "
set -g @custom_window_panel "#[bg=#{@thm_surface_0},fg=#{@thm_mantle}] #[bg=#{@thm_surface_0},fg=#{@thm_lavender}]#{E:@custom_window_text}#[bg=#{@thm_mantle}, fg=#{@thm_surface_0}]"
set -g @custom_window_active_text "#I  #W "
set -g @custom_window_active_panel "#[bg=#{@thm_lavender},fg=#{@thm_mantle}] #[bg=#{@thm_lavender},fg=#{@thm_mantle}]#{E:@custom_window_active_text}#[bg=#{@thm_mantle}, fg=#{@thm_lavender}]"

# Status Bar Left
set -g status-left "#{?client_prefix,#{E:@custom_left_0_panel_prefix},#{E:@custom_left_0_panel}}"

# Status Bar Right
set -g status-right "#{E:@custom_right_2_panel}"
set -ag status-right "#{E:@custom_right_1_panel}"
set -ag status-right "#{E:@custom_right_0_panel}"

# Status Bar Window
set -g window-status-format "#{E:@custom_window_panel}"
set -g window-status-current-format "#{E:@custom_window_active_panel}" 
set -g window-status-separator ""

# Blank Status Bar ---
set -g status 2
set -g status-format[1] "#[fill=#{@thm_bg}]"

# Pane
set -g pane-border-lines single
set -g pane-border-status top
set -g pane-border-indicators off
set -g pane-border-format " #P: #{pane_current_command}#{E:@pane_fg} "
set -g pane-border-style "fg=#{@thm_lavender}"
set -g pane-active-border-style "fg=#{?client_prefix,#{@thm_peach},#{@thm_yellow}}"

# Pane Window
set -g window-style ""
set -g window-active-style ""

# Other
set -g mode-style "fg=#{@thm_crust},bg=#{@thm_lavender}"
set -g message-style "fg=#{@thm_peach},bg=#{@thm_mantle}"
set -g message-command-style "fg=#{@thm_bg},bg=#{@thm_blue}"

set -g popup-border-lines single
set -g popup-border-style "fg=#{@thm_lavender}"

# --- Popup Configuration ---
bind -T Float escape if -F "#{==:#{session_name},MusicQueue}" detach-client kill-pane
bind -T Float '~' display-popup -w 100% -h 100% -E 'fzf-cheatsheet.sh #{pane_tty}'

set-hook -g session-created {
  if -F "#{==:#{session_name},Popup}" {
    set -t Popup key-table Float
    set -t Popup status off
    set -t Popup pane-border-format "#[align=centre] #{pane_current_command} "
    set -t Popup popup-border-lines none
  }
  if -F "#{==:#{session_name},MusicQueue}" {
    set -t MusicQueue key-table Float
    set -t MusicQueue status off
    set -t MusicQueue pane-border-format "#[align=centre] #{pane_current_command} "
    set -t MusicQueue popup-border-lines none
  }
}
