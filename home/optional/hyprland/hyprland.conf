# https://wiki.hyprland.org/Configuring/

#################
### Variables ###
#################

# https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = yazi
$rofi_drun = rofi -show drun
$rofi_window = rofi -show window

$rosewater = 0xfff2d5cf
$flamingo = 0xffeebebe
$pink = 0xfff4b8e4
$mauvea = 0xffca9ee6
$red = 0xffe78284
$maroon = 0xffea999c
$peach = 0xffef9f76
$yellow = 0xffe5c890
$green = 0xffa6d189
$teal = 0xff81c8be
$sky = 0xff99d1db
$sapphire = 0xff85c1dc
$blue = 0xff8caaee
$lavender = 0xffbabbf1
$text = 0xffc6d0f5
$subtext1 = 0xffb5bfe2
$subtext0 = 0xffa5adce
$overlay2 = 0xff949cbb
$overlay1 = 0xff838ba7
$overlay0 = 0xff737994
$surface2 = 0xff626880
$surface1 = 0xff51576d
$surface0 = 0xff414559
$base = 0xff303446
$mantle = 0xff292c3c
$crust = 0xff232634

################
### MONITORS ###
################

# https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,auto

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = hyprpaper & waybar

#############################
### ENVIRONMENT VARIABLES ###
#############################

# https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = EDITOR,nvim
env = VISUAL,nvim
env = PATH,$HOME/.local/bin:$PATH
env = SUDO_ASKPASS,$HOME/.local/bin/rofi-askpass

#####################
### LOOK AND FEEL ###
#####################

# --- https://wiki.hyprland.org/Configuring/Variables/ ---

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    border_size = 2
    gaps_in = 10
    gaps_out = 20
    float_gaps = 0
    gaps_workspaces = 0 
    col.inactive_border = $overlay0
    col.active_border = $lavender $lavender 45deg
    col.nogroup_border = $red
    col.nogroup_border_active = $red
    layout = scroll
    no_focus_fallback = false
    resize_on_border = true
    extend_border_grab_area = 15
    hover_icon_on_border = true
    allow_tearing = false
    resize_corner = 2
    modal_parent_blocking = true

    # https://wiki.hyprland.org/Configuring/Variables/#snap
    snap {
      enabled = true
      window_gap = 10
      monitor_gap = 10
      border_overlap = false
      respect_gaps = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 0
    rounding_power = 2.0
    active_opacity = 1.0
    inactive_opacity = .98
    fullscreen_opacity = 1.0
    dim_modal = true
    dim_inactive = true
    dim_strength = 0.05
    dim_special = 0.2
    dim_around = 0.4
    #screen_shader =
    border_part_of_window = true

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
      enabled = true
      size = 8
      passes = 1
      ignore_opacity = true
      new_optimizations = true
      xray = false
      noise = 0.0117
      contrast = 0.8916
      brightness = 0.8172
      vibrancy = 0.1696
      vibrancy_darkness = 0.0
      special = false
      popups = false
      popups_ignorealpha = 0.2
      input_methods = false
      input_methods_ignorealpha = 0.2
    }

    # https://wiki.hyprland.org/Configuring/Variables/#shadow
    shadow {
        enabled = true
        range = 4
        render_power = 3
        sharp = false
        ignore_window = true
        color = $lavender
        color_inactive = $overlay0 
        offset = 0 0
        scale = 1.0
    }

    # https://wiki.hyprland.org/Configuring/Variables/#glow
    #glow {
    #  enabled = false
    #  range = 10
    #  render_power = 3
    #  color = 
    #  color_inactive = 
    #}

}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes
    workspace_wraparound = false

    # https://wiki.hyprland.org/Configuring/Animations/
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
#gestures {
#    workspace_swipe = false
#}

###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = ALT # Sets "Windows" key as main modifier

#https://wiki.hyprland.org/Configuring/Binds/ for more

# General
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, Return, exec, $rofi_drun
bind = $mainMod, W, exec, $rofi_window
bind = $mainMod, C, killactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod, M, exit,
bind = $mainMod, X, exec, pkill waybar && waybar &
bind = $mainMod, R, exec, nix-rebuild

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move active window
bind = $mainMod SHIFT, L, movetoworkspace, e+1
bind = $mainMod SHIFT, H, movetoworkspace, e-1
bind = $mainMod, Tab, cyclenext

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Ignore maximize requests from apps. You'll probably like this.
windowrule {
  name = windowrule-1
  suppress_event = maximize
  match:class = .*
}

# Fix some dragging issues with XWayland
windowrule {
  name = windowrule-2
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}

layerrule {
  name = layerrule-1
  no_anim = on
  match:namespace = ^(rofi)$
}
