[General]
#################### General ####################

# Screen Size
ScreenWidth="1920"
ScreenHeight="1080"
ScreenPadding="0"

# Font
Font="ComicShannsMono Nerd Font Mono"
FontSize="14"

# Panel Modification
RoundCorners="20"

# Virutal Keyboard
# Default 0.4, Options 0.1-1.0
KeyboardSize="0.4" 

# Time
Locale=""
TimeFormat="HH:mm"
DateFormat="dddd, MMMM d"

#################### Background ####################

BackgroundPlaceholder="./Assets/bg.mp4"
Background="./Assets/bg.mp4"
BackgroundSpeed="1.0"
PauseBackground=""
DimBackground="0.0"
CropBackground="true"
BackgroundHorizontalAlignment="center"
BackgroundVerticalAlignment="center"

#################### Colors ####################

ColorRosewater="#f2d5cf"
ColorFlamingo="#eebebe"
ColorPink="#f4b8e4"
ColorMauve="#ca9ee6"
ColorRed="#e78284"
ColorMaroon="#ea999c"
ColorPeach="#ef9f76"
ColorYellow="#e5c890"
ColorGreen="#a6d189"
ColorTeal="#81c8be"
ColorSky="#99d1db"
ColorSapphire="#85c1dc"
ColorBlue="#8caaee"
ColorLavender="#babbf1"
ColorText="#c6d0f5"
ColorSubtext1="#b5bfe2"
ColorSubtext0="#a5adce"
ColorOverlay2="#949cbb"
ColorOverlay1="#838ba7"
ColorOverlay0="#737994"
ColorSurface2="#626880"
ColorSurface1="#51576d"
ColorSurface0="#414559"
ColorBase="#303446"
ColorMantle="#292c3c"
ColorCrust="#232634"

#################### Form ####################

PartialBlur="true"
# Default false.
FullBlur=""
# Default false.
# If you use FullBlur I recommend setting BlurMax to 64 and Blur to 1.0.
BlurMax="8"
# Default 48, Options: 2-64 (can go higher because depends on Blur).
# Connected with: Blur.
Blur="2.0"
# Default 2.0, Options: 0.0-3.0 (without 3.0).
# Connected with: BlurMax.

HaveFormBackground="true"
# Form background is transparent if set to false.
# Connected with: PartialBlur and BackgroundColor.
FormPosition="left"
# Default: left, Options: left, center, right.

#################### Virtual Keyboard ####################

VirtualKeyboardPosition="left"
# Default: left, Options: left, center, right.

#################### Interface Behavior ####################

HideVirtualKeyboard="false"
HideSystemButtons="true"
HideLoginButton="false"

ForceLastUser="true"
# If set to true last successfully logged in user appeares automatically in the username field.
PasswordFocus="true"
# Automaticaly focuses password field.
HideCompletePassword="true"
# Hides the password while typing.
AllowEmptyPassword="false"
# Enable login for users without a password.
